name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ── 1. Backend: Build & Test ───────────────────────────────────────────────
  backend:
    name: Backend (.NET 8) — Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BankingMessaging.Back

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # NUGET_AUTH_TOKEN is the standard env var that NuGet reads automatically
      # when the nuget.config ClearTextPassword is set to %NUGET_AUTH_TOKEN%.
      # Using a PAT (NUGET_TOKEN secret) instead of GITHUB_TOKEN because
      # GITHUB_TOKEN is scoped to THIS repo only; Company.Observability lives
      # in a different repo under the same account and requires a PAT with
      # read:packages scope.
      #
      # To create the secret:
      #   1. Go to https://github.com/settings/tokens → Generate new token (classic)
      #   2. Select scope: read:packages
      #   3. Copy the token
      #   4. Go to repo Settings → Secrets and variables → Actions → New repository secret
      #   5. Name: NUGET_TOKEN  Value: <paste token>
      - name: Restore
        run: dotnet restore
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.NUGET_TOKEN }}

      - name: Build
        run: dotnet build --no-restore -c Release
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.NUGET_TOKEN }}

      - name: Test
        run: dotnet test --no-build -c Release --verbosity normal --logger "trx;LogFileName=results.trx"
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: BankingMessaging.Back/tests/**/TestResults/*.trx

  # ── 2. Frontend: Type-check + Build ───────────────────────────────────────
  frontend:
    name: Frontend (React + Vite) — Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BankingMessaging.Front

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: BankingMessaging.Front/package-lock.json

      - name: Install
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
